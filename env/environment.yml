# Board-side conda env for building & testing BCDL (aarch64).
# Created by scripts/bootstrap_board.sh:  conda env create -f env/environment.yml
name: bcdl
channels:
  - conda-forge
dependencies:
  - python=3.10
  - cmake>=3.18
  - ninja
  - nanobind
  - numpy
  - pytest
  - pip
  - libopencv   # OpenCV 5 (cv::resize/findContours/minAreaRect/rotatedRectIntersection);
                # pulls conda's newer libstdc++ (CXXABI_1.3.15) the task layer links against.
